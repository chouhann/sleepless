# Server Configuration
server.port=8080

# Database Configuration (H2 File-based by default for portability)
spring.datasource.url=jdbc:h2:file:./db/sleepless;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Configuration Example (Commented out)
# spring.datasource.url=jdbc:mysql://localhost:3307/sleepless?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# If switching to MySQL, use MySQL8Dialect:
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Custom Properties
sleepless.upload-dir=./uploads
sleepless.jwt-secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 86400000 ms = 24 hours
sleepless.jwt-expiration-ms=86400000
